<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bibliotecário - BiblioTEC</title>
     <link rel="icon" type="image/x-icon" href="images/BiblioTEC_Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="CSS/Login_Bibliotecario_Style.css">
</head>
<body>
    <div class="container">
        <h2>Login Bibliotecário</h2>
        <div id="mensagemLogin" class="cadMensagem"></div>
        <form id="loginBiblioForm">
            <input type="email" id="emailBiblio" placeholder="E-mail" required>
            <input type="password" id="passwordBiblio" placeholder="Senha" required>
            <!-- Campo opcional: ID da escola (descomente se necessário) -->
            <!-- <input type="text" id="idEscola" placeholder="ID da Escola"> -->
            <button type="submit">
                <i class="fa fa-sign-in"></i> Entrar
            </button>
        </form>
        <p class="link">
            <a href="Cadastro_Bibliotecario.html">Não tem conta? Cadastre-se</a>
        </p>
        <button class="voltar" onclick="history.back()">
            <i class="fa fa-arrow-left"></i> Voltar
        </button>
    </div>

    <script type="module" src="JS/Firebase_Login_Bibliotecario.js"></script>
</body>
</html>
